<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Starke Verben Trainer</title>
<style>
  :root{
    --bg:#1e2230; --card:#2a2f42; --accent:#5ec98f; --accent2:#e8665f;
    --text:#eef0f5; --muted:#9aa1b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:"Segoe UI", Arial, sans-serif; display:flex; flex-direction:column;
    align-items:center; padding:24px 12px;
  }
  h1{margin:8px 0 4px; font-size:1.6em;}
  .sub{color:var(--muted); margin-bottom:16px; font-size:0.95em; text-align:center;}
  .panel{
    background:var(--card); border-radius:16px; padding:20px 24px; width:100%;
    max-width:560px; box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .levels{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px;}
  .levels label{
    background:#373d54; padding:6px 12px; border-radius:20px; cursor:pointer;
    font-size:0.9em; user-select:none; transition:.15s;
  }
  .levels input{margin-right:6px;}
  .levels label.active{background:var(--accent); color:#10331f; font-weight:600;}
  .stats{display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.95em; color:var(--muted);}
  .stats b{color:var(--text); font-size:1.1em;}
  .badge{display:inline-block; background:#373d54; padding:2px 10px; border-radius:10px; font-size:.8em; margin-left:6px;}
  .verb{font-size:2em; text-align:center; margin:18px 0 6px; font-weight:700;}
  .verb small{display:block; color:var(--muted); font-size:.5em; font-weight:400; margin-top:4px;}
  .question{text-align:center; color:var(--muted); margin-bottom:18px;}
  .options{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .opt{
    background:#373d54; border:2px solid transparent; color:var(--text); border-radius:12px;
    padding:14px 10px; font-size:1.05em; cursor:pointer; transition:.12s;
  }
  .opt:hover{border-color:#5e6790;}
  .opt.correct{background:var(--accent); color:#10331f; border-color:var(--accent);}
  .opt.wrong{background:var(--accent2); color:#3a0f0c; border-color:var(--accent2);}
  .opt:disabled{cursor:default;}
  #feedback{min-height:28px; text-align:center; margin-top:14px; font-weight:600;}
  #nextBtn{
    display:block; margin:14px auto 0; background:var(--accent); color:#10331f; border:none;
    padding:10px 28px; border-radius:24px; font-size:1em; font-weight:700; cursor:pointer;
  }
  #nextBtn:hover{filter:brightness(1.08);}
  #restartBtn{
    background:none; border:1px solid #5e6790; color:var(--muted); padding:6px 14px;
    border-radius:16px; cursor:pointer; font-size:.85em; margin-top:18px;
  }
</style>
</head>
<body>

<h1>🔥 Starke Verben Trainer</h1>
<div class="sub">Infinitiv → Präteritum oder Perfekt. Wähle die richtige Form, ganz ohne Zeitdruck.</div>

<div class="panel">
  <div class="levels" id="levels"></div>
  <div class="stats">
    Punkte: <b id="score">0</b>
    Serie: <b id="streak">0</b> <span id="bestBadge" class="badge">Beste Serie: 0</span>
  </div>
  <div class="verb" id="verbDisplay"></div>
  <div class="question" id="questionText"></div>
  <div class="options" id="options"></div>
  <div id="feedback"></div>
  <button id="nextBtn" style="display:none;">Weiter →</button>
  <div style="text-align:center;"><button id="restartBtn">Neu starten</button></div>
</div>

["spinnen","spinnt","spann","hat gesponnen","B2"],
["stechen","sticht","stach","hat gestochen","B2"],
["stoßen","stößt","stieß","hat/ist gestoßen","B2"],
["streichen","streicht","strich","hat/ist gestrichen","B2"],
["verderben","verdirbt","verdarb","hat/ist verdorben","B2"],
["weichen","weicht","wich","ist gewichen","B2"],

["dringen","dringt","drang","hat/ist gedrungen","C1"],
["erlöschen","erlischt","erlosch","ist erloschen","C1"],
["fechten","ficht","focht","hat gefochten","C1"],

["genesen","genest","genas","ist genesen","C1"],

["bleichen","bleicht","blich","ist geblichen","C2"],
["dreschen","drischt","drosch","hat gedroschen","C2"],
["flechten","flicht","flocht","hat geflochten","C2"],
["glimmen","glimmt","glomm","hat geglommen","C2"],
["hauen","haut","hieb","hat gehauen","C2"],
["schelten","schilt","schalt","hat gescholten","C2"],
["scheren","schert","schor","hat geschoren","C2"],
["speien","speit","spie","hat gespien","C2"],
["stieben","stiebt","stob","hat/ist gestoben","C2"],
["verdrießen","verdrießt","verdross","hat verdrossen","C2"],
["weben","webt","wob","hat gewoben","C2"],
];

const LEVELS = ["A1","A2","B1","B2","C1","C2"];
const activeLevels = new Set(["A1","A2","B1"]);

let score = 0, streak = 0, best = 0;
let pool = [];
let current = null;
let askField = 2; // 2=Präteritum, 3=Perfekt
let locked = false;

const levelsEl = document.getElementById("levels");
const scoreEl = document.getElementById("score");
const streakEl = document.getElementById("streak");
const bestBadge = document.getElementById("bestBadge");
const verbDisplay = document.getElementById("verbDisplay");
const questionText = document.getElementById("questionText");
const optionsEl = document.getElementById("options");
const feedbackEl = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");

function buildLevelToggles(){
  levelsEl.innerHTML = "";
  LEVELS.forEach(lv=>{
    const isOn = activeLevels.has(lv);
    const label = document.createElement("label");
    label.className = isOn ? "active" : "";
    label.innerHTML = `<input type="checkbox" ${isOn ? "checked" : ""}> ${lv}`;
    const cb = label.querySelector("input");
    cb.addEventListener("change", ()=>{
      if(cb.checked){ activeLevels.add(lv); label.classList.add("active"); }
      else{ activeLevels.delete(lv); label.classList.remove("active"); }
      rebuildPool();
    });
    levelsEl.appendChild(label);
  });
}

function rebuildPool(){
  pool = VERBS.filter(v=>activeLevels.has(v[4]));
}

function pickWrongOptions(correct, field){
  const candidates = pool.filter(v=>v[field] !== correct).map(v=>v[field]);
  const set = new Set();
  while(set.size < 3 && set.size < candidates.length){
    set.add(candidates[Math.floor(Math.random()*candidates.length)]);
  }
  return [...set];
}

function newQuestion(){
  if(pool.length < 4){ pool = VERBS; }
  locked = false;
  nextBtn.style.display = "none";
  feedbackEl.textContent = "";
  current = pool[Math.floor(Math.random()*pool.length)];
  askField = Math.random() < 0.5 ? 2 : 3;
  const correct = current[askField];
  const wrongs = pickWrongOptions(correct, askField);
  const options = [correct, ...wrongs].sort(()=>Math.random()-0.5);

  verbDisplay.innerHTML = `${current[0]} <small>(${current[1]}) · ${current[4]}</small>`;
  questionText.textContent = askField === 2 ? "Wie heißt das Präteritum?" : "Wie heißt das Perfekt?";

  optionsEl.innerHTML = "";
  options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = opt;
    btn.addEventListener("click", ()=>chooseAnswer(btn, opt, correct));
    optionsEl.appendChild(btn);
  });
}

function chooseAnswer(btn, picked, correct){
  if(locked) return;
  locked = true;
  [...optionsEl.children].forEach(b=>{
    b.disabled = true;
    if(b.textContent === correct) b.classList.add("correct");
    else if(b === btn) b.classList.add("wrong");
  });
  if(picked === correct){
    score += 10;
    streak += 1;
    best = Math.max(best, streak);
    feedbackEl.textContent = "✅ Richtig!";
    feedbackEl.style.color = "#5ec98f";
  } else {
    streak = 0;
    feedbackEl.textContent = picked === null ? `⏰ Zeit vorbei! Richtig: ${correct}` : `❌ Leider falsch. Richtig: ${correct}`;
    feedbackEl.style.color = "#e8665f";
  }
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  bestBadge.textContent = `Beste Serie: ${best}`;
  nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", newQuestion);
restartBtn.addEventListener("click", ()=>{
  score = 0; streak = 0; best = 0;
  scoreEl.textContent = 0; streakEl.textContent = 0; bestBadge.textContent = "Beste Serie: 0";
  newQuestion();
});

buildLevelToggles();
rebuildPool();
newQuestion();
</script>
</body>
</html>
